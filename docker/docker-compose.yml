services:
  postgres:
    image: postgres:16-alpine
    container_name: facebook-scraper-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scraper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scraper_password}
      POSTGRES_DB: ${POSTGRES_DB:-facebook_scraper}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-scraper} -d ${POSTGRES_DB:-facebook_scraper}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
